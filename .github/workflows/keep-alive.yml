name: Render & Supabase Keep-Alive

on:
  schedule:
    # Render 무료 티어의 15분 절전 진입을 방지하기 위해 14분 주기로 실행
    - cron: '*/14 * * * *'
  workflow_dispatch: # GitHub UI에서 수동 실행 지원

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Health Endpoint
        run: |
          # 깃허브 시크릿(APP_URL) 또는 자신의 실제 렌더 배포 URL을 활용해 헬스체크 호출
          # 이 호출은 Render를 깨울 뿐만 아니라, Express 내부에서 Supabase 쿼리를 발생시켜 Supabase 7일 정지도 함께 막아줍니다.
          APP_URL="${{ secrets.APP_URL }}"
          if [ -z "$APP_URL" ] || [ "$APP_URL" = "MY_APP_URL" ]; then
            APP_URL="https://ai-wellness-care-center.onrender.com" # 본인의 렌더 서비스명에 맞게 이 부분을 수정하셔도 됩니다.
          fi
          echo "Pinging health endpoint at $APP_URL/api/health..."
          curl -s "$APP_URL/api/health"
